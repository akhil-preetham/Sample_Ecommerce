spring:
  application:
    name: product-service
  datasource:
    url: jdbc:mysql://${PRODUCT_DB_HOST:127.0.0.1}:${PRODUCT_DB_PORT:3406}/product_service_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:${MYSQL_ROOT_PASSWORD:rootpassword}}
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:mysql://${PRODUCT_DB_HOST:127.0.0.1}:${PRODUCT_DB_PORT:3406}/product_service_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    user: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:${MYSQL_ROOT_PASSWORD:rootpassword}}

server:
  port: 8082

eureka:
  client:
    serviceUrl:
      defaultZone: http://admin:admin@localhost:8761/eureka/
  instance:
    preferIpAddress: false
