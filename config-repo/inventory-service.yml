spring:
  datasource:
    url: jdbc:mysql://${INVENTORY_DB_HOST:127.0.0.1}:${INVENTORY_DB_PORT:3406}/inventory_service_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:${MYSQL_ROOT_PASSWORD:rootpassword}}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    url: jdbc:mysql://${INVENTORY_DB_HOST:127.0.0.1}:${INVENTORY_DB_PORT:3406}/inventory_service_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    user: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:${MYSQL_ROOT_PASSWORD:rootpassword}}
    enabled: true
    locations: classpath:db/migration
