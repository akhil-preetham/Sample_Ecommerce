jwt:
  secret: ${JWT_SECRET:yourSuperSecretKeyThatIsAtLeast32CharactersLongAndShouldBeChangedInProduction}
  expiration: 3600000
  refresh-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.ecommerce: DEBUG
